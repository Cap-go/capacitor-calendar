<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>@capgo/capacitor-calendar Example</title>
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <img class="app-logo" src="/app-icon.svg" alt="" width="68" height="68" />
        <div>
          <h1>@capgo/capacitor-calendar</h1>
          <p class="lead">Calendar and reminder bridge smoke test.</p>
        </div>
      </header>

      <label for="event-title">Event title</label>
      <input id="event-title" type="text" value="Capgo calendar test" />

      <div class="actions">
        <button id="check-permissions">Check permissions</button>
        <button id="request-calendar">Request calendar</button>
        <button id="create-event">Create event</button>
        <button id="create-event-prompt">Open create UI</button>
        <button id="list-calendars">List calendars</button>
        <button id="list-events">List week</button>
      </div>

      <pre id="plugin-output">Press a button to run an action.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
